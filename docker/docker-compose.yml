version: "3.9"

services:
  api:
    build: ..
    container_name: dq-monitor-api
    ports:
      - "8000:8000"
    env_file: ../.env
    restart: unless-stopped

  airflow-webserver:
    image: apache/airflow:2.8.1
    container_name: dq-monitor-airflow
    ports:
      - "8080:8080"
    env_file: ../.env
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
    volumes:
      - ../dags:/opt/airflow/dags
      - ../src:/opt/airflow/src
    command: webserver
    restart: unless-stopped
